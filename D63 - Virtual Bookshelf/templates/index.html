<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Library</title>
  </head>
  <body>
    <h1>My Library</h1>
    {% if empty %}
        <p>Library is empty</p>
    {% else %}
      <ul>
      {% for item in books %}
          <li>{{ item.title }} - {{ item.author }} - {{ item.rating }}/10</li>
        <a href=" {{ url_for('delete', id=item.id) }} ">Delete</a> |
        <a href=" {{ url_for('edit', id=item.id) }} ">Edit Rating</a>

      {% endfor %}
       </ul>
    {% endif %}
    <a href="{{ url_for('add' )}}">Add New Book</a>
  </body>
</html>
